<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b2ebf2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hexFacet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b2ebf2;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Main hexagon shape -->
  <polygon points="32,4 52,16 52,40 32,52 12,40 12,16" fill="url(#hexGrad)" stroke="#4dd0e1" stroke-width="1"/>
  
  <!-- Crystal facets -->
  <polygon points="32,4 32,28 52,16" fill="url(#hexFacet1)" stroke="#4dd0e1" stroke-width="0.5"/>
  <polygon points="32,4 12,16 32,28" fill="url(#hexFacet1)" stroke="#4dd0e1" stroke-width="0.5"/>
  <polygon points="32,28 52,16 52,40" fill="#81d4fa" stroke="#4dd0e1" stroke-width="0.5" opacity="0.6"/>
  <polygon points="32,28 12,16 12,40" fill="#4fc3f7" stroke="#4dd0e1" stroke-width="0.5" opacity="0.6"/>
  <polygon points="32,28 52,40 32,52" fill="#81d4fa" stroke="#4dd0e1" stroke-width="0.5" opacity="0.5"/>
  <polygon points="32,28 12,40 32,52" fill="#4fc3f7" stroke="#4dd0e1" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Center facet -->
  <polygon points="32,28 42,22 42,38 32,44 22,38 22,22" fill="#b2ebf2" stroke="#4dd0e1" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Base -->
  <ellipse cx="32" cy="56" rx="20" ry="4" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <ellipse cx="32" cy="54" rx="18" ry="3" fill="#d0d0d0" stroke="#aaa" stroke-width="0.5"/>
</svg>
