<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b2ebf2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="starFacet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b2ebf2;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Main star shape -->
  <polygon points="32,4 38,24 58,24 42,36 48,56 32,44 16,56 22,36 6,24 26,24" fill="url(#starGrad)" stroke="#4dd0e1" stroke-width="1"/>
  
  <!-- Crystal facets -->
  <polygon points="32,4 32,28 38,24" fill="url(#starFacet1)" stroke="#4dd0e1" stroke-width="0.5"/>
  <polygon points="32,4 26,24 32,28" fill="url(#starFacet1)" stroke="#4dd0e1" stroke-width="0.5"/>
  <polygon points="32,28 38,24 42,36" fill="#81d4fa" stroke="#4dd0e1" stroke-width="0.5" opacity="0.6"/>
  <polygon points="32,28 26,24 22,36" fill="#4fc3f7" stroke="#4dd0e1" stroke-width="0.5" opacity="0.6"/>
  <polygon points="32,28 42,36 32,44" fill="#81d4fa" stroke="#4dd0e1" stroke-width="0.5" opacity="0.5"/>
  <polygon points="32,28 22,36 32,44" fill="#4fc3f7" stroke="#4dd0e1" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Base -->
  <ellipse cx="32" cy="56" rx="20" ry="4" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
  <ellipse cx="32" cy="54" rx="18" ry="3" fill="#d0d0d0" stroke="#aaa" stroke-width="0.5"/>
</svg>
